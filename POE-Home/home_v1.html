<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POE — Personal Observation Engine</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a1814;--amber:#fa8c16;--amber-d:#d97706;--ag:rgba(250,140,22,.42);--ag2:rgba(250,140,22,.07);--text:#fffffb;--ts:#d4c8b0;--tm:#746551;--bd:#2e2a22;--bds:#4a4334;--fm:"IBM Plex Mono",monospace;--fb:"Orbitron",monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:var(--fm);background:var(--bg);color:var(--text);}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.10) 3px,rgba(0,0,0,0) 4px);}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 48%,rgba(0,0,0,.5) 100%);}

@keyframes blink    {0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes dot-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.82)}}
@keyframes fadein   {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-up {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes orbit-a  {from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes orbit-b  {from{transform:translate(-50%,-50%) rotate(360deg)}to{transform:translate(-50%,-50%) rotate(0)}}
@keyframes glow-idle{
  0%,100%{filter:drop-shadow(0 0 14px rgba(250,140,22,.48)) drop-shadow(0 0 30px rgba(250,140,22,.16));}
  50%    {filter:drop-shadow(0 0 24px rgba(250,140,22,.72)) drop-shadow(0 0 50px rgba(250,140,22,.26));}
}
@keyframes glow-speaking{
  0%,100%{filter:drop-shadow(0 0 22px rgba(250,140,22,.88)) drop-shadow(0 0 55px rgba(250,140,22,.44));transform:translate(-50%,-50%) scale(1);}
  50%    {filter:drop-shadow(0 0 36px rgba(250,140,22,1))   drop-shadow(0 0 80px rgba(250,140,22,.62));transform:translate(-50%,-50%) scale(1.042);}
}
@keyframes ring-out{0%{transform:translate(-50%,-50%) scale(1);opacity:.6}100%{transform:translate(-50%,-50%) scale(2.05);opacity:0}}
@keyframes sp-scan{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity .7s ease;}
#splash.out{opacity:0;pointer-events:none;}
#sl{width:150px;height:150px;object-fit:contain;border-radius:50%;animation:glow-idle 3.5s ease-in-out infinite;}
.sp-wrap{text-align:center;margin-top:1.8rem;}
.sp-brand{font-family:var(--fb);font-size:2.2rem;font-weight:900;color:var(--amber);letter-spacing:.18em;text-shadow:0 0 18px var(--ag);}
.sp-brand::after{content:"_";animation:blink 1.1s steps(1) infinite;}
.sp-msg{font-size:.72rem;color:var(--tm);letter-spacing:.07em;font-style:italic;margin:.9rem 0 .6rem;min-height:1.1em;transition:opacity .3s;}
.sp-dots{display:flex;gap:.4rem;justify-content:center;margin:.4rem 0;}
.sp-bar{width:240px;height:2px;background:var(--bd);border-radius:1px;margin:1.1rem auto 0;overflow:hidden;}
.sp-fill{height:100%;background:var(--amber);border-radius:1px;width:0%;transition:width 1.2s ease;box-shadow:0 0 8px var(--ag);}
.sp-scan{position:fixed;inset:0;pointer-events:none;background:linear-gradient(to bottom,transparent 40%,rgba(250,140,22,.03) 50%,transparent 60%);animation:sp-scan 4s linear infinite;}

/* VOICE SCREEN */
#vs{position:fixed;inset:0;transition:opacity .45s;z-index:10;}
#vs.hidden{opacity:0;pointer-events:none;}
#vc{position:absolute;inset:0;width:100%;height:100%;}

/* Orbit rings */
.oring{position:fixed;top:50%;left:50%;border-radius:50%;border:1px solid rgba(250,140,22,.12);pointer-events:none;z-index:2;}
.o1{width:272px;height:272px;transform:translate(-50%,-50%);animation:orbit-a 16s linear infinite;}
.o1::after{content:"";position:absolute;width:7px;height:7px;background:var(--amber);border-radius:50%;top:-3.5px;left:calc(50% - 3.5px);box-shadow:0 0 7px var(--ag);}
.o2{width:308px;height:308px;transform:translate(-50%,-50%);border-color:rgba(250,140,22,.06);animation:orbit-b 26s linear infinite;}

/* Pulse rings (speaking only) */
.ring{position:fixed;top:50%;left:50%;width:220px;height:220px;border-radius:50%;border:1.5px solid rgba(250,140,22,.5);pointer-events:none;z-index:2;display:none;}
.ring.r1{animation:ring-out 1.8s ease-out infinite;}
.ring.r2{animation:ring-out 1.8s ease-out .6s infinite;}
body.speaking .ring{display:block;}

/* Logo: fixed perfectly centered */
#pl{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;object-fit:contain;border-radius:50%;cursor:pointer;z-index:3;animation:glow-idle 3.5s ease-in-out infinite;-webkit-tap-highlight-color:transparent;}
#pl:hover{filter:drop-shadow(0 0 20px rgba(250,140,22,.7)) drop-shadow(0 0 40px rgba(250,140,22,.3));}
body.speaking #pl{animation:glow-speaking 1s ease-in-out infinite;}

/* POE brand — below ring */
.pb{position:fixed;top:calc(50% + 136px);left:50%;transform:translateX(-50%);font-family:var(--fb);font-size:1.65rem;font-weight:900;color:var(--amber);letter-spacing:.18em;text-shadow:0 0 18px var(--ag),0 0 36px rgba(250,140,22,.15);z-index:3;white-space:nowrap;}
.pb::after{content:"_";animation:blink 1.1s steps(1) infinite;}
.pstatus{position:fixed;top:calc(50% + 175px);left:50%;transform:translateX(-50%);font-size:.68rem;color:var(--tm);letter-spacing:.08em;font-style:italic;z-index:3;white-space:nowrap;transition:color .3s;}
body.speaking .pstatus{color:var(--amber);}

.cb{position:fixed;bottom:1.4rem;right:1.4rem;z-index:20;font-family:var(--fm);font-size:.65rem;color:var(--tm);border:1px solid var(--bd);padding:.28rem .7rem;border-radius:4px;cursor:pointer;transition:all .15s;background:rgba(26,24,20,.9);backdrop-filter:blur(4px);}
.cb:hover{color:var(--amber);border-color:var(--amber);}

/* TEXT SCREEN */
#ts{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .45s;z-index:10;}
#ts.on{opacity:1;pointer-events:all;}
.th{display:flex;align-items:center;justify-content:space-between;padding:.72rem 1.4rem;border-bottom:1px solid var(--bd);background:rgba(26,24,20,.97);backdrop-filter:blur(8px);flex-shrink:0;}
.tb{display:flex;align-items:center;gap:.65rem;}
.tl{width:38px;height:38px;object-fit:contain;border-radius:50%;filter:drop-shadow(0 0 5px rgba(250,140,22,.45));cursor:pointer;}
.tl:hover{filter:drop-shadow(0 0 9px rgba(250,140,22,.75));}
.tn{font-family:var(--fb);font-size:1rem;font-weight:900;color:var(--amber);letter-spacing:.12em;}
.tn::after{content:"_";animation:blink 1.1s steps(1) infinite;}
.sd{width:6px;height:6px;border-radius:50%;background:#52c41a;box-shadow:0 0 6px rgba(82,196,26,.6);animation:dot-pulse 2.5s ease-in-out infinite;display:inline-block;margin-right:.4rem;}
.bv{font-family:var(--fm);font-size:.65rem;color:var(--tm);border:1px solid var(--bd);padding:.24rem .65rem;border-radius:4px;cursor:pointer;transition:all .15s;background:transparent;}
.bv:hover{color:var(--amber);border-color:var(--amber);}
.msgs{flex:1;overflow-y:auto;padding:.9rem 1.4rem;display:flex;flex-direction:column;gap:.5rem;}
.msgs::-webkit-scrollbar{width:4px;}
.msgs::-webkit-scrollbar-thumb{background:var(--bds);border-radius:2px;}
.msg{font-size:.8rem;padding:.52rem .88rem;border-radius:6px;max-width:68%;line-height:1.6;animation:slide-up .22s ease;}
.mp{background:rgba(44,40,31,.92);border:1px solid var(--bd);border-left:2px solid var(--amber);color:var(--ts);font-style:italic;align-self:flex-start;}
.mu{background:rgba(250,140,22,.1);border:1px solid rgba(250,140,22,.22);color:var(--text);align-self:flex-end;}
.typing-ind{display:none;align-self:flex-start;padding:.4rem .75rem;background:rgba(44,40,31,.75);border:1px solid var(--bd);border-left:2px solid var(--amber);border-radius:6px;gap:.3rem;align-items:center;}
.typing-ind.show{display:flex;}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:dot-pulse .8s ease-in-out infinite;}
.tdot:nth-child(2){animation-delay:.18s;}.tdot:nth-child(3){animation-delay:.36s;}
.iz{padding:.8rem 1.4rem 1.1rem;border-top:1px solid var(--bd);background:rgba(26,24,20,.97);backdrop-filter:blur(8px);flex-shrink:0;}
.ib{display:flex;align-items:center;gap:.45rem;}
.inf{flex:1;background:rgba(31,28,22,.95);border:1px solid var(--bd);border-radius:6px;color:var(--text);font-family:var(--fm);font-size:.8rem;padding:.58rem .88rem;outline:none;transition:border-color .2s;}
.inf:focus{border-color:var(--amber);box-shadow:0 0 0 1px rgba(250,140,22,.16);}
.inf::placeholder{color:var(--tm);font-style:italic;}
.bs{width:42px;height:42px;background:var(--amber);color:#1a1814;border:none;border-radius:6px;font-size:.92rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bs:hover{background:var(--amber-d);box-shadow:0 0 12px var(--ag);}
.bms{width:42px;height:42px;background:transparent;color:var(--tm);border:1px solid var(--bd);border-radius:6px;font-size:1rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bms:hover{color:var(--amber);border-color:var(--amber);}

/* Top nav */
.vnav{position:fixed;top:0;left:0;right:0;z-index:4;display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.5rem;}
.vnav-brand{font-family:var(--fb);font-size:.78rem;font-weight:700;color:rgba(250,140,22,.45);letter-spacing:.14em;}
.vnav-links{display:flex;gap:.2rem;}
.vnav-link{font-family:var(--fm);font-size:.64rem;color:var(--tm);padding:.2rem .55rem;border:1px solid transparent;border-radius:4px;cursor:pointer;transition:all .18s;background:rgba(26,24,20,.55);backdrop-filter:blur(4px);letter-spacing:.04em;}
.vnav-link:hover{color:var(--amber);border-color:var(--bds);}
.vnav-link.active{color:var(--amber);border-color:rgba(250,140,22,.28);background:rgba(250,140,22,.06);}

/* Status panel */
.st-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:.4rem;vertical-align:1px;background:var(--tm);transition:background .3s;}
.st-dot.ok{background:#6fbf73;box-shadow:0 0 6px rgba(111,191,115,.55);}
.st-dot.warn{background:var(--amber);box-shadow:0 0 6px var(--ag);}
.st-dot.err{background:#e05d5d;box-shadow:0 0 6px rgba(224,93,93,.55);}
#stPanel{position:fixed;top:2.7rem;right:1.5rem;width:312px;z-index:20;background:rgba(26,24,20,.94);backdrop-filter:blur(8px);border:1px solid var(--bds);border-radius:8px;padding:.95rem 1.05rem;display:none;animation:fadein .25s ease;}
#stPanel.open{display:block;}
.st-h{font-family:var(--fb);font-size:.58rem;font-weight:700;color:var(--amber);letter-spacing:.16em;margin:.7rem 0 .3rem;}
.st-h:first-child{margin-top:0;}
.st-row{display:flex;justify-content:space-between;gap:.8rem;font-size:.62rem;color:var(--ts);padding:.16rem 0;letter-spacing:.03em;}
.st-row .k{color:var(--tm);white-space:nowrap;}
.st-row .v{text-align:right;}

/* Visual output panel (dual output: AGNO modules) */
#visualPanel{position:fixed;bottom:1.5rem;left:1.5rem;max-width:380px;max-height:40vh;overflow:auto;z-index:20;background:rgba(26,24,20,.94);backdrop-filter:blur(8px);border:1px solid var(--bds);border-radius:8px;padding:.8rem 1rem;display:none;animation:fadein .25s ease;}
#visualPanel.show{display:block;}
#visualPanel pre{margin:0;font-size:.6rem;color:var(--ts);white-space:pre-wrap;word-break:break-word;}

/* Voice transcript panel */
#vt{position:fixed;top:calc(50% + 205px);left:50%;transform:translateX(-50%);width:min(520px,82vw);z-index:3;display:flex;flex-direction:column;gap:.45rem;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;}
#vt.show{opacity:1;}
#vtu{font-size:.67rem;color:var(--tm);font-style:italic;letter-spacing:.04em;}
#vtp{font-size:.85rem;color:var(--amber);line-height:1.6;text-shadow:0 0 10px rgba(250,140,22,.25);min-height:1.2em;}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-scan"></div>
  <img id="sl" src="/logo" alt="POE">
  <div class="sp-wrap">
    <div class="sp-brand">POE</div>
    <p class="sp-msg" id="spmsg">Inizializzazione sistemi in corso…</p>
    <div class="sp-dots">
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>
    <div class="sp-bar"><div class="sp-fill" id="spfill"></div></div>
  </div>
</div>

<div id="vs">
  <!-- Top nav: sezioni POE -->
  <nav class="vnav">
    <span class="vnav-brand">POE</span>
    <div class="vnav-links">
      <a class="vnav-link active" onclick="setSection(this,'osint')">OSINT</a>
      <a class="vnav-link" onclick="setSection(this,'diario')">DIARIO</a>
      <a class="vnav-link" onclick="setSection(this,'analisi')">ANALISI</a>
      <a class="vnav-link" id="stLink" onclick="toggleStatus()"><span class="st-dot" id="stDot"></span>STATUS</a>
    </div>
  </nav>

  <!-- Status panel -->
  <div id="stPanel">
    <div class="st-h">POE</div><div id="stPoe"></div>
    <div class="st-h">SISTEMA</div><div id="stSys"></div>
    <div class="st-h">MODULI</div><div id="stMod"></div>
  </div>
  <canvas id="vc"></canvas>
  <div class="oring o1"></div>
  <div class="oring o2"></div>
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <img id="pl" src="/logo" alt="POE" onclick="toggleVoice()">
  <div class="pb">POE</div>
  <p class="pstatus" id="pst">Clicca per parlare</p>
  <!-- Voice conversation transcript -->
  <div id="vt">
    <div id="vtu"></div>
    <div id="vtp"></div>
  </div>
  <div id="visualPanel"><pre id="visualContent"></pre></div>
  <button class="cb" onclick="showText()">&#9998; scrivi</button>
</div>

<div id="ts">
  <div class="th">
    <div class="tb">
      <span class="sd"></span>
      <img class="tl" src="/logo" alt="POE" onclick="showVoice()">
      <span class="tn">POE</span>
    </div>
    <button class="bv" onclick="showVoice()">&#127908; voce</button>
  </div>
  <div class="msgs" id="msgs">
    <div class="msg mp">Sono POE. Come posso aiutarti oggi, Efrem?</div>
    <div class="typing-ind" id="typing">
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>
  </div>
  <div class="iz">
    <div class="ib">
      <button class="bms" onclick="showVoice()">&#127908;</button>
      <input class="inf" id="ci" placeholder="Scrivi a POE&#8230;"
             onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}">
      <button class="bs" onclick="send()">&#9658;</button>
    </div>
  </div>
</div>

<script>
'use strict';
var speaking = false, vizOn = true;
var _wakeRec = null, _cmdRec = null, _awake = false, _wakeReady = false;
var BARS = 90;                      // ridotto da 180: meno draw calls
var curr = new Float32Array(BARS);
var ATK  = 0.22;                    // più lento (era 0.48)
var DEC  = 0.06;                    // più lento (era 0.08)

/* Cached logo center — aggiornato solo su resize */
var lcx = 0, lcy = 0, lir = 0;
function cacheLogoPos() {
  var dpr  = devicePixelRatio || 1;
  var rect = document.getElementById('pl').getBoundingClientRect();
  lcx = Math.round((rect.left + rect.width  / 2) * dpr);
  lcy = Math.round((rect.top  + rect.height / 2) * dpr);
  lir = Math.round((rect.width / 2 + 12)          * dpr);
}
window.addEventListener('resize', cacheLogoPos);
window.addEventListener('load',   function() { setTimeout(cacheLogoPos, 60); });

/* Audio: più lenta e meno sensibile */
var t = 0;
function updateAudio(loud) {
  t += 1;
  var amp = loud ? 0.58 : 0.22;   // ridotto (era 0.88/0.32)
  for (var i = 0; i < BARS; i++) {
    var n    = i / BARS;
    var bass = Math.abs(Math.sin(n * Math.PI * 2.0 + t * 0.022)) * (loud ? 0.55 : 0.18);
    var mid  = Math.abs(Math.sin(n * Math.PI * 6.0 + t * 0.042)) * (loud ? 0.38 : 0.12);
    var noise = Math.random() * (loud ? 0.18 : 0.05);
    /* Spike raro (ridotta frequenza) */
    if (Math.random() < (loud ? 0.025 : 0.005)) noise += loud ? 0.3 : 0.08;
    var targ = Math.min(1, (bass + mid + noise) * amp);
    curr[i] += (targ > curr[i]) ? (targ - curr[i]) * ATK : (targ - curr[i]) * DEC;
  }
}

/* Draw — NO shadowBlur per-barra: usa offscreen glow pass invece */
function drawNCS(ctx, cw, ch) {
  if (lcx === 0) return;  // non ancora inizializzato
  var maxB = Math.min(cw, ch) * (speaking ? 0.26 : 0.16);
  var bw   = Math.max(1.8, cw / 550);  // larghezza barra

  for (var i = 0; i < BARS; i++) {
    var angle = (i / BARS) * Math.PI * 2 - Math.PI / 2;
    var v     = curr[i];
    var bh    = v * maxB;
    var cos   = Math.cos(angle), sin = Math.sin(angle);

    ctx.beginPath();
    ctx.moveTo(lcx + cos * lir,       lcy + sin * lir);
    ctx.lineTo(lcx + cos * (lir+bh),  lcy + sin * (lir+bh));

    /* Colore varia con ampiezza — no shadow individuale */
    ctx.strokeStyle = 'rgba(250,140,22,' + (0.25 + v * 0.75) + ')';
    ctx.lineWidth   = bw;
    ctx.stroke();
  }

  /* Singolo glow pass sul canvas completo (molto più economico) */
  if (speaking) {
    ctx.filter = 'blur(3px)';
    ctx.globalAlpha = 0.18;
    ctx.drawImage(ctx.canvas, 0, 0);
    ctx.globalAlpha = 1;
    ctx.filter = 'none';
  }

  /* Inner ring */
  ctx.beginPath();
  ctx.arc(lcx, lcy, lir, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(250,140,22,' + (speaking ? 0.28 : 0.10) + ')';
  ctx.lineWidth   = 1;
  ctx.stroke();
}

/* Render loop */
var cv  = document.getElementById('vc');
var raf = null;
function loop() {
  if (vizOn) {
    var dpr  = devicePixelRatio || 1;
    var rect = cv.getBoundingClientRect();
    var cw   = Math.round(rect.width  * dpr);
    var ch   = Math.round(rect.height * dpr);
    if (cv.width !== cw || cv.height !== ch) { cv.width = cw; cv.height = ch; cacheLogoPos(); }
    var ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, cw, ch);
    updateAudio(speaking);
    drawNCS(ctx, cw, ch);
  }
  raf = requestAnimationFrame(loop);
}
loop();

/* Mode */
var voiceTimer = null;
function toggleVoice() {
  speaking = !speaking;
  document.body.classList.toggle('speaking', speaking);
  var pst = document.getElementById('pst');
  if (speaking) {
    pst.textContent = 'In ascolto…';
    voiceTimer = setTimeout(function() {
      speaking = false;
      document.body.classList.remove('speaking');
      pst.textContent = 'Clicca per parlare';
    }, 5000);
  } else {
    if (voiceTimer) { clearTimeout(voiceTimer); voiceTimer = null; }
    pst.textContent = 'Clicca per parlare';
  }
}
function showText() {
  document.getElementById('vs').classList.add('hidden');
  document.getElementById('ts').classList.add('on');
  vizOn = false;
  if (speaking) { speaking = false; document.body.classList.remove('speaking'); }
}
function showVoice() {
  document.getElementById('ts').classList.remove('on');
  document.getElementById('vs').classList.remove('hidden');
  vizOn = true;
  setTimeout(cacheLogoPos, 30);
}

/* Chat */
function addMsg(t,c){var m=document.getElementById('msgs'),ind=document.getElementById('typing'),d=document.createElement('div');d.className='msg '+c;d.textContent=t;m.insertBefore(d,ind);m.scrollTop=m.scrollHeight;}

/* AudioContext sbloccato una volta al primo gesto utente */
var _actx = null;
var _actxSrc = null;
function _getCtx(){
  if(!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==='suspended') _actx.resume();
  return _actx;
}

/* Ack pre-caricati come blob URL: play istantaneo via Audio(), niente
   AudioContext (che richiederebbe un gesto utente per il resume). */
var _ackUrls = [];
function preloadAcks() {
  for (var i = 0; i < 32; i++) (function(n){
    fetch("/ack/" + n)
      .then(function(r){ return r.ok ? r.blob() : null; })
      .then(function(b){ if (b) _ackUrls.push(URL.createObjectURL(b)); })
      .catch(function(){});
  })(i);
}

function _playAck(done) {
  var fired = false;
  function fin(){ if (fired) return; fired = true; done(); }
  var src = _ackUrls.length > 0
    ? _ackUrls[Math.floor(Math.random() * _ackUrls.length)]
    : "/ack/" + Math.floor(Math.random() * 32);
  var a = new Audio(src);
  a.onended = fin;
  a.onerror = function(){ setTimeout(fin, 300); };
  /* safety net: se l'audio non parte/finisce entro 10s, procedi comunque */
  setTimeout(fin, 10000);
  a.play().catch(function(){ setTimeout(fin, 400); });
}

/* Doppio beep ascendente — indica apertura microfono comando */
function _beep() {
  try {
    var ctx = _getCtx();
    ctx.resume().then(function() {
      [820, 1080].forEach(function(freq, i) {
        var osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = "sine";
        var t0 = ctx.currentTime + i * 0.11;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(0.15, t0 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.1);
        osc.start(t0); osc.stop(t0 + 0.12);
      });
    });
  } catch(e) {}
}

function send(){
  var i=document.getElementById('ci'), t=i.value.trim();
  if(!t) return;
  i.value='';
  _doSpeak(t);
}

function _doSpeak(t){
  var onVoice = !document.getElementById("ts").classList.contains("on");

  if (onVoice) {
    document.getElementById("vtu").textContent = t;
    document.getElementById("vtp").textContent = "";
    document.getElementById("vt").classList.add("show");
    _setPst("Elaborazione...");
  } else {
    addMsg(t, "mu");
  }

  if (_wakeRec) { try { _wakeRec.stop(); } catch(e) {} }

  var ctx = _getCtx();
  var _sil = ctx.createBuffer(1,1,22050);
  var _silSrc = ctx.createBufferSource();
  _silSrc.buffer = _sil; _silSrc.connect(ctx.destination); _silSrc.start(0);

  var ind = onVoice ? null : document.getElementById("typing");
  if (ind) { ind.classList.add("show"); document.getElementById("msgs").scrollTop = 99999; }

  var pendingText = null;
  var liveBubble = null;

  function ensureBubble(){
    if (!liveBubble) {
      if (onVoice) {
        liveBubble = document.getElementById("vtp");
      } else {
        var m = document.getElementById("msgs");
        liveBubble = document.createElement("div");
        liveBubble.className = "msg mp";
        m.insertBefore(liveBubble, ind);
      }
    }
    return liveBubble;
  }

  function startSyncReveal(arrayBuf){
    if (ind) ind.classList.remove("show");
    var text = pendingText || "";
    var bubble = ensureBubble();
    bubble.textContent = "";
    if (_actxSrc) { try { _actxSrc.stop(); } catch(e) {} _actxSrc = null; }

    ctx.decodeAudioData(arrayBuf.slice(0), function(decoded){
      ctx.resume().then(function(){
        var startAt = ctx.currentTime + 0.04;
        var src = ctx.createBufferSource();
        src.buffer = decoded; src.connect(ctx.destination);
        src.start(startAt);
        speaking = true; document.body.classList.add("speaking");
        _actxSrc = src;

        src.onended = function(){
          if (_actxSrc === src) _actxSrc = null;
          bubble.textContent = text;
          speaking = false; document.body.classList.remove("speaking");
          if (onVoice) {
            /* modalita' conversazione: riapri il microfono per il follow-up;
               se resta silenzio, startCommandCapture torna da solo al wake mode */
            setTimeout(startCommandCapture, 300);
          } else {
            startWakeListener();
          }
        };

        var dur = decoded.duration;
        function tick(){
          var elapsed = Math.max(0, ctx.currentTime - startAt);
          var shown = Math.ceil(Math.min(elapsed / dur, 1) * text.length);
          bubble.textContent = text.substring(0, shown);
          if (!onVoice) document.getElementById("msgs").scrollTop = 99999;
          if (elapsed < dur) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

      }).catch(function(err){
        bubble.textContent = text;
        if (!onVoice) addMsg("[Errore resume: " + err + "]", "mp");
      });
    }, function(err){
      bubble.textContent = text || "";
      if (!onVoice) addMsg("[Errore decode: " + err + "]", "mp");
    });
  }

  var ws = new WebSocket("ws://127.0.0.1:8000/ws/speak");
  ws.binaryType = "arraybuffer";

  ws.onopen = function(){ ws.send(JSON.stringify({text: t})); };

  ws.onmessage = function(e){
    if (typeof e.data === "string") {
      var msg = JSON.parse(e.data);
      if (msg.type === "token") {
        // testo live disabilitato: la trascrizione appare solo in sync con l'audio
        if (onVoice) _setPst("POE sta pensando...");
      } else if (msg.type === "text") {
        pendingText = msg.content;
        if (onVoice) _setPst("Genero la voce...");
      } else if (msg.type === "visual") {
        var vp = document.getElementById("visualPanel");
        if (msg.content) {
          document.getElementById("visualContent").textContent = JSON.stringify(msg.content, null, 2);
          vp.classList.add("show");
        } else {
          vp.classList.remove("show");
        }
      }
    } else {
      startSyncReveal(e.data);
    }
  };

  ws.onerror = function(){
    if (!liveBubble && !pendingText) {
      if (ind) ind.classList.remove("show");
      if (onVoice) {
        document.getElementById("vtp").textContent = "[Errore connessione]";
      } else {
        addMsg("[Errore connessione]", "mp");
      }
    }
  };
  ws.onclose = function(){};
}

/* Wake word */
function _hasWake(text) {
  var t = text.toLowerCase().trim();
  // word-level: "po" or "poi" anywhere in utterance
  var words = t.split(/\s+/);
  for (var w = 0; w < words.length; w++) {
    if (words[w] === "po" || words[w] === "poi" || words[w] === "poe" ||
        words[w] === "apple" || words[w] === "epo") return true;
  }
  if (t.indexOf("poe") >= 0) return true;
  if (t.indexOf("ehipo") >= 0 || t.indexOf("ehippo") >= 0 || t.indexOf("eipo") >= 0) return true;
  return false;
}
function _afterWake(text) {
  var t = text.toLowerCase();
  var kw = ["ei poe","hey poe","ai poe","ehippo","ehipo","eipo","epo","poe","poi","po"];
  for (var k = 0; k < kw.length; k++) {
    var idx = t.indexOf(kw[k]);
    if (idx >= 0) {
      var rest = text.substring(idx + kw[k].length).replace(/^[\s,!?.]+/, "").trim();
      if (rest.length > 0) return rest;
    }
  }
  return "";
}

function _setPst(txt) { var el=document.getElementById('pst'); if(el) el.textContent=txt; }

var _lastWakeTxt = "", _lastWakeTs = 0;

function startWakeListener() {
  if (_awake || !_wakeReady) return;
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { _setPst("SpeechRecognition non supportato"); return; }
  if (_wakeRec) { try { _wakeRec.abort(); } catch(e) {} }
  _wakeRec = new SR();
  _wakeRec.continuous = true;
  _wakeRec.interimResults = true;
  _wakeRec.lang = "it-IT";

  _wakeRec.onstart = function() { _setPst("Di' Poe o Ei Poe"); };

  _wakeRec.onresult = function(ev) {
    if (_awake) return;
    for (var i = ev.resultIndex; i < ev.results.length; i++) {
      var txt = ev.results[i][0].transcript.trim();
      if (!txt) continue;
      // deduplication: stessa stringa entro 1.5s → ignora (fix stuck-word loop)
      var now = Date.now();
      if (txt === _lastWakeTxt && now - _lastWakeTs < 1500) continue;
      _lastWakeTxt = txt; _lastWakeTs = now;
      fetch("/log",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({msg:txt})});
      if (_hasWake(txt)) {
        _awake = true;
        try { _wakeRec.stop(); } catch(e) {}
        _setPst("...");
        var cmd = _afterWake(txt);
        if (cmd.length > 2) {
          setTimeout(function(c){ _awake=false; _doSpeak(c); }.bind(null,cmd), 100);
        } else {
          _playAck(startCommandCapture);
        }
        return;
      }
    }
  };

  // onend ricrea istanza fresca — evita restart su istanza stale (stuck-word fix)
  _wakeRec.onend = function() {
    if (!_awake && _wakeReady) { setTimeout(startWakeListener, 400); }
  };

  _wakeRec.onerror = function(ev) {
    if (ev.error === "not-allowed" || ev.error === "service-not-allowed") {
      _setPst("Microfono negato - abilita nel browser");
    } else if (ev.error !== "no-speech" && ev.error !== "aborted") {
      setTimeout(startWakeListener, 2000);
    }
  };

  try { _wakeRec.start(); }
  catch(e) { _setPst("Errore avvio mic: " + e.message); }
}

function startCommandCapture() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { _awake = false; startWakeListener(); return; }
  if (_cmdRec) { try { _cmdRec.abort(); } catch(e) {} }

  _beep();
  _setPst("In ascolto...");
  speaking = true; document.body.classList.add("speaking");

  _cmdRec = new SR();
  _cmdRec.continuous = true;
  _cmdRec.interimResults = true;
  _cmdRec.lang = "it-IT";

  var _bestFinal = "", _bestInterim = "", _cmdTimer = null, _gotSpeech = false;

  function _commitCmd() {
    if (!_cmdRec) return;
    if (_cmdTimer) { clearTimeout(_cmdTimer); _cmdTimer = null; }
    var rec = _cmdRec; _cmdRec = null;
    try { rec.abort(); } catch(e) {}
    var cmd = (_bestFinal || _bestInterim || "").trim();
    _awake = false;
    speaking = false; document.body.classList.remove("speaking");
    _setPst("Clicca per parlare");
    if (cmd.length > 1) { setTimeout(function(){ _doSpeak(cmd); }, 50); }
    else { startWakeListener(); }
  }

  // silenzio iniziale: 7s senza parlato → commit vuoto → torna al wake mode
  _cmdTimer = setTimeout(_commitCmd, 7000);

  _cmdRec.onresult = function(ev) {
    for (var i = ev.resultIndex; i < ev.results.length; i++) {
      var txt = ev.results[i][0].transcript.trim();
      if (!_gotSpeech && txt) {
        // primo parlato rilevato: passa dal timer-silenzio al tetto massimo 14s
        _gotSpeech = true;
        clearTimeout(_cmdTimer);
        _cmdTimer = setTimeout(_commitCmd, 14000);
      }
      if (ev.results[i].isFinal) {
        _bestFinal += (_bestFinal ? " " : "") + txt;
        // 2.5s di silenzio dopo l'ultima parola finale → commit
        clearTimeout(_cmdTimer);
        _cmdTimer = setTimeout(_commitCmd, 2500);
      } else {
        _bestInterim = txt;
        _setPst(txt || "In ascolto...");
      }
    }
  };

  // continuous mode: riavvia se si chiude inaspettatamente
  _cmdRec.onend = function() {
    if (_cmdRec) { try { _cmdRec.start(); } catch(e) { _commitCmd(); } }
  };

  _cmdRec.onerror = function(ev) {
    if (ev.error === "no-speech") return;
    _commitCmd();
  };

  try { _cmdRec.start(); }
  catch(e) {
    _awake = false;
    _setPst("Clicca per parlare");
    setTimeout(startWakeListener, 500);
  }
}

/* ── Splash / health polling ─────────────────────────────────────────── */
var _spMsgs = [
  'Inizializzazione sistemi in corso…',
  'Caricamento moduli cognitivi…',
  'Sincronizzazione voce neurale…',
  'Calibrazione identificatore timbrico…',
  'Sistemi quasi pronti…',
];
var _spIdx = 0, _spProg = 4;

function _spNext(msg) {
  var el = document.getElementById('spmsg');
  el.style.opacity = '0';
  setTimeout(function(){ el.textContent = msg; el.style.opacity = '1'; }, 200);
}

function pollReady() {
  fetch('/health').then(function(r){ return r.json(); }).then(function(d){
    if (d.ready) {
      document.getElementById('spfill').style.width = '100%';
      _spNext('Sistemi attivi. Benvenuto, Efrem.');
      _wakeReady = true;
      preloadAcks();
      startWakeListener();
      _stFetch();
      setInterval(_stFetch, 60000);
      setTimeout(function(){
        var s = document.getElementById('splash');
        s.classList.add('out');
        setTimeout(function(){ s.style.display = 'none'; }, 750);
      }, 800);
    } else {
      _spProg = Math.min(_spProg + 16, 82);
      document.getElementById('spfill').style.width = _spProg + '%';
      _spIdx = (_spIdx + 1) % _spMsgs.length;
      _spNext(_spMsgs[_spIdx]);
      setTimeout(pollReady, 2000);
    }
  }).catch(function(){ setTimeout(pollReady, 2000); });
}
setTimeout(pollReady, 800);

function setSection(el, name) {
  document.querySelectorAll('.vnav-link').forEach(function(a){a.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('pst').textContent = {osint:'Modalità OSINT — analisi entità', diario:'Modalità Diario — note e osservazioni', analisi:'Modalità Analisi — pattern e correlazioni'}[name] || 'Clicca per parlare';
}

/* ── Status panel ───────────────────────────────────────────────────────── */
var _stTimer = null;

function _stRow(k, v, dotCls) {
  var dot = dotCls ? "<span class=\"st-dot " + dotCls + "\"></span>" : "";
  return "<div class=\"st-row\"><span class=\"k\">" + k + "</span><span class=\"v\">" + dot + v + "</span></div>";
}

function _stDotFor(val) {
  if (val === "ok" || val === "operativo" || val === "online") return "ok";
  if (val === "degradato" || val === "offline") return "warn";
  return "err";
}

function _stRender(d) {
  var comp = d.poe.componenti;
  var poeHtml = _stRow("Stato", d.poe.stato, _stDotFor(d.poe.stato)) +
                _stRow("Attivo da", d.poe.uptime) +
                _stRow("LLM", comp.llm, _stDotFor(comp.llm)) +
                _stRow("TTS", comp.tts, _stDotFor(comp.tts)) +
                _stRow("Voce RVC", comp.rvc, _stDotFor(comp.rvc));
  var s = d.sistema;
  var sysHtml = _stRow("Data", s.data) +
                _stRow("Device", s.device) +
                _stRow("RAM libera", s.ram_libera_gb + " GB") +
                _stRow("Batteria", s.batteria) +
                _stRow("Rete", s.rete, _stDotFor(s.rete));
  var modHtml = "";
  d.moduli.forEach(function(m) {
    var cls = m.stato.indexOf("in sviluppo") === 0 ? "" : "warn";
    modHtml += _stRow(m.nome, m.stato, cls);
  });
  document.getElementById("stPoe").innerHTML = poeHtml;
  document.getElementById("stSys").innerHTML = sysHtml;
  document.getElementById("stMod").innerHTML = modHtml;
  // pallino nella nav: verde se tutto ok, ambra se degradato
  document.getElementById("stDot").className = "st-dot " + _stDotFor(d.poe.stato);
}

function _stFetch() {
  fetch("/status").then(function(r){ return r.json(); }).then(_stRender)
    .catch(function(){ document.getElementById("stDot").className = "st-dot err"; });
}

function toggleStatus() {
  var p = document.getElementById("stPanel");
  if (p.classList.contains("open")) {
    p.classList.remove("open");
    if (_stTimer) { clearInterval(_stTimer); _stTimer = null; }
  } else {
    p.classList.add("open");
    _stFetch();
    _stTimer = setInterval(_stFetch, 5000);
  }
}
</script>
