# IANA TLD list — seed iniziale di POE v0.3
#
# Questo file viene caricato dal RegexExtractor per filtrare i candidati
# domain. Una TLD non listata qui non viene riconosciuta come dominio.
#
# QUESTO È UN SEED INIZIALE (~150 TLD comuni), NON la lista IANA completa.
# La lista IANA ufficiale conta ~1500 TLD. Per scaricarla:
#
#     python scripts/refresh_tlds.py
#
# Lo script richiede accesso di rete a https://data.iana.org/ e va eseguito
# manualmente dall'Operatore. Il seed copre TLD comuni e gTLD diffusi:
# è sufficiente per uso quotidiano ma può perdere ccTLD esotici e nuovi
# gTLD. Il refresh si consiglia ogni 6-12 mesi.
#
# Refresh effettuato: mai (file in stato seed)
# Conteggio: 140 TLD
#
# NON modificare a mano. Per aggiornare lanciare lo script.

